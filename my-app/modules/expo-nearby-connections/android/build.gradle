plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.nearbyconnections'
version = '1.0.0'

android {
  namespace "expo.modules.nearbyconnections"

  defaultConfig {
    versionCode 1
    versionName '1.0.0'
  }
}

dependencies {
  implementation "com.google.android.gms:play-services-nearby:19.3.0"
}
